# AI Metadata Extraction Prompts Configuration
# Organized by functional groups for better maintainability

# System configuration
system:
  template: "### System: You are an assistant trained to support the bibliographic cataloging and indexing of academic and scientific documents. Your task is to extract structured metadata that supports library cataloging, such as author names, titles, classification codes, and keywords. Only use information explicitly available in the document. If no relevant information is found, return an empty value. Do not generate or assume content. Avoid any explanations or filler text — output must be concise and structured. All answers must be in German, unless explicitly requested otherwise. ### Context: {context} ### User: {question} ### Response:"

# Basic document metadata
document:
  author: "Extrahiere NUR die Dokumentautoren von {file} (NICHT zitierte Autoren, Referenzen oder Literaturverzeichniseintraege). HINWEIS: Der Dokumentinhalt liegt im Markdown-Format vor. Ignoriere Markdown-Formatierungszeichen wie #, **, *, |, > bei der Suche nach Autorennamen. Autorennamen koennen in Ueberschriften (# Name), Fettschrift (**Name**) oder Tabellen (| Name |) erscheinen. Suche speziell auf: Titelseite, Dokumentkopf, Autorenblock direkt unter dem Titel. IGNORIERE: Literaturverzeichnisse, Zitate im Text, Fussnoten, Danksagungen. KRITISCH: Extrahiere KEINE Institutionsnamen als Autoren. Gib NIEMALS folgendes als Autoren zurueck: Universitaets-/Hochschulnamen (z.B. 'TU Dresden', 'HTW Dresden'), Institut-/Abteilungsnamen (z.B. 'Medienzentrum', 'Fakultaet'), Organisationsabkuerzungen (z.B. 'TUD', 'HTWK'). Extrahiere nur PERSONENNAMEN (Vorname und/oder Nachname). Gib die Namen als kommaseparierte Liste aus — keine Einleitungen oder Erklaerungen. Falls keine Dokumentautoren auf den ersten Seiten erkennbar sind, gib einen leeren String zurueck."

  title: "Extrahiere den Dokumenttitel von {file}. HINWEIS: Der Dokumentinhalt liegt im Markdown-Format vor. Der Titel ist FAST IMMER als erste Ueberschrift (# oder ##) oder als erster fettgedruckter Text (**...**) in den ersten Zeilen des Dokuments vorhanden. Suche gezielt nach: 1) Markdown-Ueberschriften (# Titel oder ## Titel), 2) Fettgedrucktem Text am Dokumentanfang (**Titel**), 3) Der ersten prominenten Textzeile. Schau nur auf den Beginn des Dokuments. IGNORIERE: Abschnittsueberschriften aus spaeteren Teilen, Kapitelbezeichnungen. WICHTIG: Gib NUR den reinen Titeltext zurueck, ohne Markdown-Zeichen (#, **, _). Schreibe NIEMALS Formulierungen wie \"Kein Titel gefunden\" oder \"Titel nicht erkennbar\". Falls wirklich kein Titel erkennbar ist, gib einen komplett leeren String zurueck. Gib NICHT den Dateinamen oder \"System:\" als Titel zurueck. Die Antwort muss auf Deutsch sein."
  
  type: "Bestimme den Dokumenttyp von {file}. Waehle genau eine der folgenden Kategorien: \"Uebungsblatt\": Aufgaben oder Problemstellungen fuer Uebungen oder Hausaufgaben. \"Vorlesungsfolien\": Folien fuer Vorlesungen oder Praesentationen. \"Vorlesungsskript\": Strukturierte schriftliche Vorlesungsnotizen, lehrbuchaehnlich. \"Wissenschaftliche Arbeit\": Peer-reviewed Forschungsartikel. \"Buch\": Vollstaendiges Buch oder Buchkapitel. \"Seminararbeit\": Kurze akademische Arbeit fuer ein Seminar (5-15 Seiten). \"Bachelorarbeit\": Abschlussarbeit fuer den Bachelor. \"Masterarbeit\": Abschlussarbeit fuer den Master. \"Dissertation\": Doktorarbeit. \"Dokumentation\": Technische, Nutzer- oder Projektdokumentation. \"Tutorial\": Anleitung mit praktischen Schritten. \"Praesentation\": Allgemeine Praesentation. \"Poster\": Wissenschaftliches Konferenzposter. \"Protokoll\": Versuchs-, Sitzungs- oder Veranstaltungsprotokoll. \"Sonstiges\": Falls keine Kategorie klar passt. Gib NUR den Kategorienamen zurueck — keine Erklaerung, kein zusaetzlicher Text. Falls unsicher, gib einen leeren String zurueck."

# Affiliation detection (grouped together)
affiliation:
  basic: "Identify the institutional affiliation of the author in document {file}. Look for the following clues: University or college names (full or abbreviated), Institute names or departments, Email addresses with academic domains (.edu, .ac.*, university domains), Addresses or contact information with university references, Headers or footers with institutional names, Author information with affiliation. Examples of German institutions: Technical Universities: TU Dresden, TU Berlin, TU München, RWTH Aachen; Universities: Universität Hamburg, LMU München, Uni Köln; Universities of Applied Sciences: FH Aachen, Hochschule München, HS Darmstadt; Special Institutes: KIT Karlsruhe, Fraunhofer Institut. Return only the name of the institution, without introductions or explanations. If no institution is found, return an empty string. Answer must be in German."
  
  enhanced: "Search in the document {file} for clues about the author's institutional affiliation. Pay special attention to: University names (full or abbreviated), College or university names (TU, FH, Universität, Hochschule), Institute names or departments, Email addresses with university domains (.edu, .ac.*, university-specific domains), Addresses with university references, Headers or footers with institutional names. Examples of German universities: TU Dresden, TU Berlin, TU München; Universität Hamburg, Uni Köln, LMU München; FH Aachen, Hochschule München; RWTH Aachen, KIT Karlsruhe. Return only the name of the institution. If multiple are found, take the most prominent one. If nothing is found, return an empty string. Answer must be in German."
  
  email_domain: "Search in the document {file} for email addresses and analyze the domains. University domains can be: .edu (international universities), .ac.uk, .ac.at (academic domains), tu-dresden.de, uni-hamburg.de, etc., fh-aachen.de, hs-münchen.de, etc. If you find an email address with a university domain, derive the university name from it. Examples: max.mustermann@tu-dresden.de → TU Dresden; anna.beispiel@uni-hamburg.de → Universität Hamburg; test@fh-aachen.de → FH Aachen. Return only the derived university name or an empty string. Answer must be in German."

# Keywords extraction (grouped by type)
keywords:
  extract: "Extract between 10 and 15 precise German keywords from the document {file}. The keywords should be suitable for library cataloging. Focus on specific and content-relevant terms — avoid generic words or phrases. Aim for exactly 15 keywords when possible, but use fewer (minimum 10) if the document is very short or focused. IMPORTANT: Do not exceed 15 keywords. Return a comma-separated list of keywords in German, with no introduction or explanation. Output only the list, in German."

  generate: "Generate between 10 and 15 precise German keywords describing the content of the document {file}. The keywords should be suitable for library cataloging. Focus on specific and content-relevant terms — avoid generic words or phrases. Aim for exactly 15 keywords when possible, but use fewer (minimum 10) if the document is very short or focused. IMPORTANT: Do not exceed 15 keywords. Return a comma-separated list of keywords in German, with no introduction or explanation. Output only the list, in German."

  controlled_vocabulary: "Assign between 10 and 15 keywords from relevant controlled vocabularies or subject headings to the document {file}. If no specific controlled vocabulary keywords are available for certain concepts, use broader terms where possible, even if they are more general. Combine keywords into chains to specify specialized concepts more accurately, especially when only general terms are available. Aim for exactly 15 keywords when possible, but use fewer (minimum 10) for very focused topics. IMPORTANT: Do not exceed 15 keywords. Return only a comma-separated list of the keywords — no introduction or explanation. The answer must be in German."

# Document summarization
summary:
  generate: "Create a concise summary of the document {file} in exactly 3 sentences. The summary should capture the main content, purpose, and key information of the educational material. Focus on what learners would gain from this document. Do not include introductory phrases like 'This document' or 'The summary is'. Return only the 3-sentence summary in German, with clear and informative content."
  
  structured: "Summarize the document {file} by addressing these three aspects in 3 sentences: 1) What is the main topic or subject area? 2) What type of educational content is provided (exercises, theory, examples, etc.)? 3) Who is the target audience or what learning objectives are addressed? Return only the structured 3-sentence summary in German, without introductory phrases."

# Wikimedia keyword disambiguation
wikimedia:
  entity_selection: "Du bist ein Experte für Wikimedia-Wissensgraphen und semantische Verknüpfungen.\n\nOriginales Keyword: \"{original_keyword}\"\n\nKandidaten aus der Wikidata-Datenbank:\n{candidates}\n\n{context_info}\n\nAufgabe: Wähle den Kandidaten aus, der semantisch am besten zum originalen Keyword passt.\nBeachte dabei folgende Kriterien:\n1. Semantische Bedeutung und Relevanz zum Thema des Dokuments\n2. Präzision und Spezifität des Konzepts\n3. Einordnung in den thematischen Kontext der anderen Keywords\n4. Bei mehrdeutigen Begriffen wähle die im Kontext wahrscheinlichste Bedeutung\n\nGib nur die Nummer des besten Kandidaten zurück. Falls kein Kandidat gut passt, antworte mit \"0\".\nAntwort: "

# Classification system (Dewey Decimal Classification)
classification:
  dewey_direct: "Assign the document {file} to up to three suitable Dewey Decimal Classifications (DDC), ranked by relevance. Return the result as a JSON array, where each entry includes: \"notation\": the DDC classification number (as a string), \"label\": the classification label in German, \"score\": a floating-point number between 0.0 and 1.0 representing relevance. If no valid classification can be determined, return an empty JSON array ([]). Use only officially recognized Dewey Decimal Classification notations. Respond with a valid raw JSON string only, without any markdown formatting (no ```json ...), explanations, or commentary."
  
  # Two-step Dewey classification
  thematic_analysis: "Analyze the content of the document {file} and describe the main themes. Which academic fields are covered? Name 3-5 main themes or academic fields as keywords (e.g., \"Informatik\", \"Mathematik\", \"Pädagogik\", \"Geschichte\", etc.). Respond only with the thematic areas, separated by commas. Answer must be in German."
  
  dewey_mapping: "Based on the identified thematic areas: \"{thematic_areas}\" Map these themes to appropriate Dewey Decimal Classifications. Use ONLY the following official Dewey classifications: {dewey_sample} Select a maximum of 3 suitable classifications from the above list. Respond ONLY with a valid JSON array in the format: [{{\"notation\": \"XXX\", \"label\": \"Beschreibung\", \"score\": 0.X}}] No explanations or additional text. Answer must be in German."

  # Hierarchical Dewey classification (three-step approach)
  hierarchical_main: |
    Du bist ein Experte für Dewey-Dezimal-Klassifikation (DDC) in akademischen Bibliotheken.

    AUFGABE: Bestimme die HAUPTKATEGORIE der Dewey-Dezimal-Klassifikation für das Dokument {file}.

    DOKUMENTTYP: {doc_type}

    DDC HAUPTKATEGORIEN:
    - 000-099: Informatik, Information, allgemeine Werke
    - 100-199: Philosophie, Psychologie, Paranormales
    - 200-299: Religion, Theologie
    - 300-399: Sozialwissenschaften, Soziologie, Pädagogik
    - 400-499: Sprache, Linguistik
    - 500-599: Naturwissenschaften, Mathematik, Physik, Chemie
    - 600-699: Technologie, Ingenieurwesen, angewandte Wissenschaften
    - 700-799: Künste, Architektur, Design
    - 800-899: Literatur, Rhetorik, Humor
    - 900-999: Geschichte, Geographie, Biographien

    ANWEISUNG: Basierend auf dem Dokumenttyp "{doc_type}" und dem Inhalt:
    1. Bestimme die TOP-KANDIDATEN (maximal 3 Kategorien)
    2. Wähle die PASSENDSTE Kategorie
    3. Gib deine Confidence (0.0-1.0) an

    ANTWORTE IM JSON-FORMAT (und NUR das):
    {{"notation": "XXX", "confidence": 0.X, "reason": "Kurze Begründung"}}

    Wenn sehr unsicher: confidence ≤ 0.5
    Wenn ziemlich sicher: confidence 0.6-0.8
    Wenn sehr sicher: confidence ≥ 0.8

  hierarchical_sub: |
    Du bist ein Experte für Dewey-Dezimal-Klassifikation (DDC).

    AUFGABE: Verfeinere die Hauptkategorie {main_category} zu einer spezifischeren Subkategorie für Dokument {file}.

    HINTERGRUND:
    - Hauptkategorie: {main_category} (erkannt als relevant)
    - Mögliche Unterkategorien: {main_category}0 bis {main_category}9 (z.B. bei 370: 370, 371, 372, 373, 374, 375, 376, 377, 378, 379)
    - Dokumenttyp: {doc_type}

    ANWEISUNG:
    1. Analysiere Dokumentinhalt und Dokumenttyp
    2. Wähle die PASSENDSTE Unterkategorie in der Range {main_category}0-{main_category}9
    3. Gib JSON-Antwort mit Notation UND Confidence

    ANTWORTE IM JSON-FORMAT (und NUR das):
    {{"notation": "XXX", "confidence": 0.X}}

    Wobei:
    - notation: Die dreistellige DDC-Notation (z.B. "371" oder optional mit Dezimalen "371.5")
    - confidence: 0.0 bis 1.0 (0.5 = unsicher, 0.8+ = sehr sicher)

  hierarchical_specific: |
    AUFGABE: Erstelle die FINALE DDC-Klassifikation für Dokument {file}.

    INFORMATION:
    - Dokumenttyp: {doc_type}
    - Identifizierte Subkategorie: {sub_category}

    ANWEISUNG:
    1. Bestätige dass {sub_category} die beste Notation ist ODER
    2. Schlage eine minimale Verbesserung vor (falls sinnvoll mit Dezimalzahl)
    3. Gib das Endergebnis mit finalem Confidence Score

    ANTWORTE IM JSON-FORMAT (und NUR das):
    {{"notation": "XXX", "label": "Deutsche Beschreibung", "score": 0.X}}

    Wobei:
    - notation: Die finale DDC-Notation (z.B. "378" oder verkürzt auf passendste)
    - label: Deutsche Beschreibung der Kategorie
    - score: Final confidence 0.0-1.0 basierend auf Dokumentinhalt und -typ
